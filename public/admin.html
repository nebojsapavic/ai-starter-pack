<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel – AI Starter Pack</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#fff;font-family:'Exo 2',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#E30613}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#111;border:1px solid rgba(227,6,19,.3);padding:48px;width:100%;max-width:400px}
.login-box h1{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
.login-box p{color:#666;font-size:13px;margin-bottom:32px}
.f-label{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#666;margin-bottom:8px;display:block}
.f-input{width:100%;padding:12px 18px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:40px;color:#fff;font-family:'Exo 2',sans-serif;font-size:14px;outline:none;margin-bottom:20px}
.f-input:focus{border-color:rgba(227,6,19,.5)}
.btn{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;padding:12px 28px;cursor:pointer;border:none;background:#E30613;color:#fff;width:100%}
.btn:hover{background:#b80010}
.error{color:#ef4444;font-size:12px;margin-bottom:16px;display:none}
.error.show{display:block}

/* Dashboard */
.dashboard{display:none}
.topbar{background:#111;border-bottom:1px solid rgba(255,255,255,.07);padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;letter-spacing:3px;text-transform:uppercase}
.topbar h1 span{color:#E30613}
.logout-btn{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:none;border:1px solid rgba(255,255,255,.2);color:#888;padding:8px 20px;cursor:pointer}
.logout-btn:hover{border-color:#E30613;color:#E30613}

.content{padding:32px}
.stats-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:16px;margin-bottom:32px}
.stat{background:#111;border:1px solid rgba(255,255,255,.07);padding:20px;text-align:center}
.stat-val{font-family:'Rajdhani',sans-serif;font-size:36px;font-weight:900;color:#E30613;line-height:1}
.stat-label{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#555;margin-top:6px}

.section-title{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#666;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.07)}

.search-bar{width:100%;max-width:400px;padding:10px 18px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:40px;color:#fff;font-family:'Exo 2',sans-serif;font-size:13px;outline:none;margin-bottom:20px}
.search-bar:focus{border-color:rgba(227,6,19,.4)}

table{width:100%;border-collapse:collapse}
th{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#555;padding:10px 14px;text-align:left;border-bottom:1px solid rgba(255,255,255,.07)}
td{padding:14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;color:#aaa;vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{display:inline-block;padding:3px 10px;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.badge-green{background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.3)}
.badge-red{background:rgba(227,6,19,.1);color:#E30613;border:1px solid rgba(227,6,19,.2)}
.badge-grey{background:rgba(255,255,255,.05);color:#666;border:1px solid rgba(255,255,255,.1)}
.progress-bar-wrap{width:120px;height:4px;background:rgba(255,255,255,.08);border-radius:2px}
.progress-bar-fill{height:100%;background:#E30613;border-radius:2px;transition:width .3s}
.delete-btn{background:none;border:1px solid rgba(239,68,68,.3);color:#ef4444;padding:5px 12px;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.delete-btn:hover{background:rgba(239,68,68,.1)}
.loading{text-align:center;padding:40px;color:#555;font-family:'Rajdhani',sans-serif;letter-spacing:2px;text-transform:uppercase}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <h1>Admin <span style="color:#E30613">Panel</span></h1>
    <p>AI Starter Pack – administratorski pristup</p>
    <div class="error" id="login-err">Pogrešna lozinka.</div>
    <label class="f-label">Admin lozinka:</label>
    <input type="password" class="f-input" id="admin-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" onclick="doLogin()">PRIJAVI SE</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="topbar">
    <h1>AI Starter Pack <span>Admin</span></h1>
    <button class="logout-btn" onclick="doLogout()">Odjava</button>
  </div>
  <div class="content">
    <div class="section-title">Statistike</div>
    <div class="stats-grid" id="stats-grid">
      <div class="loading" style="grid-column:1/-1">Učitavanje...</div>
    </div>
    <div class="section-title">Korisnici</div>
    <input type="text" class="search-bar" placeholder="Pretraži po imenu ili emailu..." oninput="filterUsers(this.value)">
    <div id="users-wrap"><div class="loading">Učitavanje korisnika...</div></div>
  </div>
</div>

<script>
let adminToken = localStorage.getItem('adminToken');
let allUsers = [];

if (adminToken) showDashboard();

async function doLogin() {
  const pass = document.getElementById('admin-pass').value;
  const err = document.getElementById('login-err');
  try {
    const res = await fetch('/api/admin/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ password: pass }) });
    const data = await res.json();
    if (!res.ok) { err.classList.add('show'); return; }
    adminToken = data.token;
    localStorage.setItem('adminToken', adminToken);
    err.classList.remove('show');
    showDashboard();
  } catch { err.classList.add('show'); }
}

function doLogout() {
  localStorage.removeItem('adminToken');
  adminToken = null;
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-wrap').style.display = 'flex';
}

async function showDashboard() {
  document.getElementById('login-wrap').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadStats();
  loadUsers();
}

async function loadStats() {
  try {
    const res = await fetch('/api/admin/stats', { headers: { 'Authorization': 'Bearer ' + adminToken } });
    const s = await res.json();
    document.getElementById('stats-grid').innerHTML = `
      <div class="stat"><div class="stat-val">${s.totalUsers}</div><div class="stat-label">Ukupno korisnika</div></div>
      <div class="stat"><div class="stat-val">${s.newToday}</div><div class="stat-label">Novi danas</div></div>
      <div class="stat"><div class="stat-val">${s.totalProgress}</div><div class="stat-label">Lekcija završeno</div></div>
      <div class="stat"><div class="stat-val">${s.totalQuizzes}</div><div class="stat-label">Kvizova urađeno</div></div>
      <div class="stat"><div class="stat-val">${s.passedQuizzes}</div><div class="stat-label">Kvizova položeno</div></div>
      <div class="stat"><div class="stat-val">${s.certificatesEarned}</div><div class="stat-label">Sertifikata</div></div>
    `;
  } catch(e) { console.error(e); }
}

async function loadUsers() {
  try {
    const res = await fetch('/api/admin/users', { headers: { 'Authorization': 'Bearer ' + adminToken } });
    allUsers = await res.json();
    renderUsers(allUsers);
  } catch(e) { document.getElementById('users-wrap').innerHTML = '<div class="loading">Greška pri učitavanju.</div>'; }
}

function filterUsers(q) {
  const filtered = allUsers.filter(u =>
    `${u.firstName} ${u.lastName} ${u.email}`.toLowerCase().includes(q.toLowerCase())
  );
  renderUsers(filtered);
}

function renderUsers(users) {
  if (users.length === 0) { document.getElementById('users-wrap').innerHTML = '<div class="loading">Nema korisnika.</div>'; return; }
  document.getElementById('users-wrap').innerHTML = `
    <table>
      <thead><tr>
        <th>Korisnik</th><th>Email</th><th>Registrovan</th>
        <th>Moduli</th><th>Napredak</th><th>Sertifikat</th><th>Akcija</th>
      </tr></thead>
      <tbody>
        ${users.map(u => `
          <tr id="row-${u.id}">
            <td><strong style="color:#fff">${u.firstName} ${u.lastName}</strong></td>
            <td>${u.email}</td>
            <td>${new Date(u.createdAt).toLocaleDateString('sr-RS')}</td>
            <td>${u.completedModules}/7</td>
            <td>
              <div class="progress-bar-wrap">
                <div class="progress-bar-fill" style="width:${Math.round(u.completedModules/7*100)}%"></div>
              </div>
            </td>
            <td>${u.certificateEarned
              ? '<span class="badge badge-green">✓ Da</span>'
              : '<span class="badge badge-grey">Ne</span>'}</td>
            <td><button class="delete-btn" onclick="deleteUser('${u.id}','${u.firstName} ${u.lastName}')">Obriši</button></td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

async function deleteUser(id, name) {
  if (!confirm(`Obrisati korisnika "${name}"? Ova akcija je nepovratna.`)) return;
  try {
    await fetch(`/api/admin/users/${id}`, { method:'DELETE', headers:{'Authorization':'Bearer '+adminToken} });
    allUsers = allUsers.filter(u => u.id !== id);
    renderUsers(allUsers);
    loadStats();
  } catch(e) { alert('Greška pri brisanju.'); }
}
</script>
</body>
</html>
